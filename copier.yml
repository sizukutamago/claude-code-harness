_min_copier_version: "9.0.0"
_subdirectory: ""

_exclude:
  # テンプレート管理ファイル
  - copier.yml
  - ".git/"
  - ".github/"
  # ハーネスリポジトリ固有（導入先に不要）
  - docs/
  - eval/
  - modules/
  - "/scripts/"
  - plans/
  - ".harness/"
  # プロジェクト既存ファイル（上書きしない）
  - HANDOVER.md
  - README.md
  - ".gitignore"
  # ハーネスリポジトリのメタファイル
  - package.json
  - package-lock.json
  # ハーネスリポジトリの変更履歴（導入先に不要）
  - CHANGELOG.md
  # 導入先に不要な md（.claude/ 内は除く）
  - "*.md"
  - "!.claude/**/*.md"

_skip_if_exists:
  - CLAUDE.md

project_name:
  type: str
  default: "my-project"
  help: "プロジェクト名"

use_playwright_mcp:
  type: bool
  default: false
  help: "Playwright MCP を使用する？（ブラウザ操作・画面確認）"

use_figma_mcp:
  type: bool
  default: false
  help: "Figma MCP を使用する？（Figma 参照・編集）"

# 条件付き Jinja テンプレート（{%- if ... -%}...{%- endif -%}）は
# 条件が false でも空ファイルを生成する。後処理で空ファイルを削除する。
_tasks:
  - "find . -maxdepth 5 \\( -name '*.md' -o -name '.mcp.json' \\) -size -2c -delete 2>/dev/null; find . -type d -empty -delete 2>/dev/null; true"
