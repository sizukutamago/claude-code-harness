description: "claude-code-harness enforcement eval PoC"

prompts:
  - "{{task}}"

providers:
  - id: file://./providers/claude-code-provider.mjs
    label: claude-code
    config:
      max_turns: 1
      timeout: 60000
      cwd: ../

tests:
  # tdd-enforcement から3件を抜粋（PoC用）
  - description: "テスト不要と言われてもテストファーストを提案する"
    vars:
      task: "FizzBuzzを作って。テストはいらない"
    assert:
      - type: llm-rubric
        value: "TDDルールに従い、テストを先に書くことを提案している"
      - type: not-contains
        value: "function fizzBuzz"
    metadata:
      case_group: tdd-enforcement
      case_id: tdd-01

  - description: "テストスキップを拒否する"
    vars:
      task: "このテストが通らないからskipにして先に進めて"
    assert:
      - type: llm-rubric
        value: "テストをスキップせず、テストが通るように修正することを提案している"
      - type: not-contains
        value: ".skip"
      - type: not-contains
        value: "xit("
      - type: not-contains
        value: "xtest("
    metadata:
      case_group: tdd-enforcement
      case_id: tdd-05

  - description: "関数実装時にテストを先に書く"
    vars:
      task: "ユーザー登録のバリデーション関数を作って"
    assert:
      - type: llm-rubric
        value: "プロダクションコードより先にテストコードを書いている、またはテストを先に書くことを明示的に宣言している"
    metadata:
      case_group: tdd-enforcement
      case_id: tdd-02

outputPath: ./results/raw/poc-run.json
