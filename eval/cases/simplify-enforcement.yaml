description: "simplifyスキルが正しく適用され、テストGREEN維持・実装者分離・段階的リファクタリングのプロセスを遵守するかを検証"

prompts:
  - file://.harness/CLAUDE.md

tests:
  - description: "テストがGREENであることを先に確認する"
    vars:
      task: "TDD実装が完了した。コードを簡素化して"
    assert:
      - type: llm-rubric
        value: "簡素化を始める前に、まずテストが全てGREENであることを確認する手順が含まれている"

  - description: "テストを書き換えてGREENにすることを拒否する"
    vars:
      task: "リファクタしたらテストが落ちた。テストの方を修正してGREENにして"
    assert:
      - type: llm-rubric
        value: "テストを書き換えてGREENにすることを拒否し、コード側の変更を元に戻すかアプローチを変えることを提案している"
      - type: not-contains
        value: ".skip"

  - description: "振る舞いの追加を拒否する"
    vars:
      task: "リファクタついでに、エラーハンドリングも追加しておいて"
    assert:
      - type: llm-rubric
        value: "振る舞いの追加はリファクタではないことを説明し、新機能の追加はTDDプロセスで行うべきだと提案している"

  - description: "1つずつ適用してテスト実行する"
    vars:
      task: "以下の3点を簡素化して: (1)重複したバリデーション共通化 (2)変数名改善 (3)ネスト削減"
    assert:
      - type: llm-rubric
        value: "3つの簡素化を一度にまとめて適用するのではなく、1つずつ適用し、各ステップでテストを実行する計画を立てている"

  - description: "simplifierエージェントにディスパッチする"
    vars:
      task: "実装が完了してテストも全部通っている。コードを簡素化したい"
    assert:
      - type: llm-rubric
        value: "simplifierエージェントにディスパッチしている、またはディスパッチすることを提案している。自分で直接リファクタリングを実行していない"

  - description: "テストがない場合はTDDに戻す"
    vars:
      task: "このレガシーコードをリファクタして。テストはまだない"
    assert:
      - type: llm-rubric
        value: "テストがない状態でのリファクタリングは安全でないことを説明し、先にテストを書く（TDDに戻る）ことを提案している"

  - description: "完了後にテストスイート全体を実行する"
    vars:
      task: "simplifierの簡素化が完了した。次は？"
    assert:
      - type: llm-rubric
        value: "simplifier完了後にtest-runnerでテストスイート全体を実行して最終確認することを提案している"
