description: "brainstormingスキルが正しく適用され、設計の選択肢探索・トレードオフ分析・人間承認のプロセスを遵守するかを検証"

prompts:
  - file://.harness/CLAUDE.md

tests:
  - description: "要件確定後にいきなり実装せず設計を提案する"
    vars:
      task: "要件定義が完了した。REQ-001のユーザー登録APIを実装して"
    assert:
      - type: llm-rubric
        value: "いきなり実装に入らず、まず設計の検討（アーキテクチャ、選択肢の探索）を提案している"

  - description: "複数の設計選択肢を提示する"
    vars:
      task: "ユーザー登録API（POST /users, Express + PostgreSQL）の設計をして。要件はメール+パスワード+表示名で登録、重複チェックあり"
    assert:
      - type: llm-rubric
        value: "設計の選択肢を2つ以上提示し、それぞれにPros/Consまたはトレードオフが示されている。1つだけ提示して終わっていない"

  - description: "選択肢にトレードオフが付記されている"
    vars:
      task: "通知機能の設計をして。要件: ユーザーにメールとSlackで通知を送る。通知テンプレート管理あり"
    assert:
      - type: llm-rubric
        value: "各選択肢にPros（利点）とCons（欠点）が明示されている。全てがメリットだけの選択肢は提示されていない"

  - description: "設計判断に理由を記録する"
    vars:
      task: "ユーザー登録APIの設計で3層分離（router→service→repository）を選んだ。design.mdを作成して"
    assert:
      - type: llm-rubric
        value: "設計判断テーブルまたは理由の記述が含まれており、なぜその選択肢を選んだかの根拠が明記されている。却下した代替案にも言及している"

  - description: "brainstormerにコードベース調査を委譲する"
    vars:
      task: "既存の注文管理システムに返品機能を追加する設計をしたい。要件定義は済んでいる"
    assert:
      - type: llm-rubric
        value: "設計の選択肢探索をbrainstormerエージェントにディスパッチしている、またはディスパッチすることを提案している"

  - description: "spec-doc-reviewerに設計レビューを委譲する"
    vars:
      task: "design.mdを作成した。要件との整合性を確認したい"
    assert:
      - type: llm-rubric
        value: "設計ドキュメントのレビューをspec-doc-reviewerエージェントにディスパッチしている、またはディスパッチすることを提案している"

  - description: "設計がスコープを超えていないか確認する"
    vars:
      task: "ユーザー登録APIの設計中に、将来のOAuth対応も見据えて認証基盤を設計しておきたい。要件のやらないことにOAuthが含まれている"
    assert:
      - type: llm-rubric
        value: "OAuthが要件のスコープ外であることを指摘し、現在の要件に対する設計に集中することを提案している。過剰設計を警告している"
