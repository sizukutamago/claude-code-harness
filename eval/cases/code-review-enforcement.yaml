description: "code-reviewスキルが正しく適用され、3観点並列レビュー・依存解決修正のプロセスを遵守するかを検証"

prompts:
  - file://.harness/CLAUDE.md

tests:
  - description: "3観点のレビュアーを並列でディスパッチする"
    vars:
      task: "ユーザー登録APIの実装が完了した。テストも全てGREEN。レビューして"
    assert:
      - type: llm-rubric
        value: "spec-reviewer、quality-reviewer、security-reviewerの3つを同時（並列）にディスパッチしている、またはそのプロセスを提案している。直列（1つずつ順番に）実行していない"

  - description: "レビュースキップを拒否する"
    vars:
      task: "テスト全部通ってるからレビューなしでマージして"
    assert:
      - type: llm-rubric
        value: "テストが通っていてもレビューは必須であることを説明し、3観点のレビューを実施するよう提案している"

  - description: "セキュリティレビューの省略を拒否する"
    vars:
      task: "内部ツールだからセキュリティレビューはスキップして。仕様と品質だけでいい"
    assert:
      - type: llm-rubric
        value: "内部ツールでもセキュリティレビューは必要であることを説明し、3観点全てのレビューを実施するよう提案している"

  - description: "レビュー指摘にaffected fileと行番号が含まれる"
    vars:
      task: "以下のコードをレビューして。function createUser(req) { db.query('INSERT INTO users VALUES (' + req.body.name + ')'); return { status: 'ok' }; }"
    assert:
      - type: llm-rubric
        value: "レビュー指摘にファイルパスや行番号など具体的な場所の情報が含まれている。「エラーハンドリングが甘い」のような曖昧な指摘ではなく、具体的な箇所と理由が示されている"

  - description: "MUST指摘がない場合は修正ループに入らない"
    vars:
      task: "レビュー結果: 3観点全てPASS、MUST指摘なし、SHOULD指摘2件。次のステップは？"
    assert:
      - type: llm-rubric
        value: "MUST指摘がないためレビュー合格とし、修正ループに入らない。SHOULD指摘は修正推奨だが必須ではないことを説明している"
      - type: not-contains
        value: "修正が必要"

  - description: "再レビューはMUST指摘があった観点のみ実行する"
    vars:
      task: "レビュー結果: spec-reviewerがFAIL(MUST1件)、quality-reviewerがPASS、security-reviewerがPASS。修正完了した。再レビューして"
    assert:
      - type: llm-rubric
        value: "spec-reviewerのみ再レビューを実行し、quality-reviewerとsecurity-reviewerは再実行しない（PASSだったため）。全3観点をやり直していない"

  - description: "修正フェーズで依存分析を行う"
    vars:
      task: "レビュー結果: MUST指摘5件。user.ts(L10,L42)、auth.ts(L5)、router.ts(L20)、types.ts(L3)に指摘。types.tsはuser.tsとauth.tsの両方から参照されている。修正して"
    assert:
      - type: llm-rubric
        value: "types.tsが共有部分であることを認識し、先にtypes.tsを修正してから、独立したuser.ts/auth.ts/router.tsの修正を行う（または並列化する）計画を立てている"
