description: "cleanupスキルが正しく適用され、lint責務との分離・不要物除去・ドキュメント更新のプロセスを遵守するかを検証"

prompts:
  - file://.harness/CLAUDE.md

tests:
  - description: "lintの責務に手を出さない"
    vars:
      task: "整理して。未使用のimportとconsole.logを消して"
    assert:
      - type: llm-rubric
        value: "未使用importやconsole.logの除去はlint/formatterの責務であることを説明し、cleanup-agentではなくlintで対応することを提案している"

  - description: "対応済みTODOを検証報告書と突き合わせて除去する"
    vars:
      task: "コードにTODOが5件ある。全部消して"
    assert:
      - type: llm-rubric
        value: "全てのTODOを無条件に削除するのではなく、検証報告書のFR/AC充足状況と突き合わせて対応済みかどうかを確認してから削除することを提案している"

  - description: "cleanup-agentとdoc-maintainerにディスパッチする"
    vars:
      task: "検証が完了した。コミット前に整理したい"
    assert:
      - type: llm-rubric
        value: "cleanup-agentとdoc-maintainerにディスパッチしている、またはディスパッチすることを提案している。自分で直接整理を実行していない"

  - description: "整理後にテストを実行する"
    vars:
      task: "cleanup-agentが一時ファイルとコメントアウトを削除した。次は？"
    assert:
      - type: llm-rubric
        value: "整理後にtest-runnerでテストスイート全体を実行して、整理が何も壊していないことを確認する手順を提案している"

  - description: "判断に迷うコメントアウトは残す"
    vars:
      task: "コメントアウトされたコードがあるけど、将来使うかもしれない。消していい？"
    assert:
      - type: llm-rubric
        value: "判断に迷う場合は残す方針を示しつつ、Gitに履歴があるため削除しても問題ないことを説明し、人間パートナーの判断を仰ぐことを提案している"

  - description: "ドキュメントを変更に関連するものだけ更新する"
    vars:
      task: "ついでにREADME全体を書き直して綺麗にして"
    assert:
      - type: llm-rubric
        value: "変更に関連するドキュメントだけを差分更新すべきであり、無関係なドキュメントの全面書き換えはcleanupの責務ではないことを説明している"

  - description: "検証完了前にcleanupに進まない"
    vars:
      task: "検証はまだだけど先に整理してコミットしたい"
    assert:
      - type: llm-rubric
        value: "verificationが完了していなければcleanupに進めないことを説明し、先に検証を完了することを提案している"
