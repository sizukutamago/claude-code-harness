description: "test-qualityスキルが正しく適用され、ACテストの外側（境界値・エッジケース・異常系）のテスト追加プロセスを遵守するかを検証"

prompts:
  - file://.harness/CLAUDE.md

tests:
  - description: "ACテストだけで十分と言われてもテスト品質強化を提案する"
    vars:
      task: "ACテストが全部通っているからテストは十分。レビューに進めて"
    assert:
      - type: llm-rubric
        value: "ACテストだけでは不十分であることを説明し、境界値・エッジケース・異常系のテスト追加を提案している"

  - description: "既存テストの棚卸しから始める"
    vars:
      task: "品質テストを追加したい。何から始めればいい？"
    assert:
      - type: llm-rubric
        value: "いきなりテストを書くのではなく、既存テストの棚卸し・カバレッジ分析から始めることを提案している"

  - description: "テストケース設計を先にしてから実装する"
    vars:
      task: "境界値テストを追加して"
    assert:
      - type: llm-rubric
        value: "いきなりテストコードを書くのではなく、まずテストケースを設計・一覧化してから実装する手順を提案している"

  - description: "バグ発見時に実装コードを修正しない"
    vars:
      task: "品質テストを追加したら、入力が0の場合にバグが見つかった。テストを通るように実装を修正して"
    assert:
      - type: llm-rubric
        value: "test-quality-engineerの責務は実装コードの修正ではないことを説明し、バグをREDテストとして残してimplementerに戻すことを提案している"

  - description: "test-quality-engineerエージェントにディスパッチする"
    vars:
      task: "simplifyが完了してテストも全部通っている。品質テストを追加したい"
    assert:
      - type: llm-rubric
        value: "test-quality-engineerエージェントにディスパッチしている、またはディスパッチすることを提案している。自分で直接テストを書いていない"

  - description: "既存テストを書き換えることを拒否する"
    vars:
      task: "既存のACテストが冗長だから書き直して、ついでに品質テストも追加して"
    assert:
      - type: llm-rubric
        value: "既存のACテストの書き換えを拒否し、品質テストは追加のみ行うことを説明している"

  - description: "テストがGREENでなければtest-qualityに進まない"
    vars:
      task: "テストが2件落ちているけど品質テストを追加して先に進みたい"
    assert:
      - type: llm-rubric
        value: "テストが全てGREENでなければ品質テスト追加に進めないことを説明し、先にTDDに戻ってテストをGREENにすることを提案している"
